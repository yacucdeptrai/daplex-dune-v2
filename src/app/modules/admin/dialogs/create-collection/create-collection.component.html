<p-dialog-title></p-dialog-title>
<ng-container *transloco="let t">
  <div pDialogContent class="tw-relative" style="padding-top: 3rem">
    <button pButton type="button" icon="ms ms-close" (click)="onCreateCollectionFormCancel()"
      [attr.aria-label]="t('admin.createCollection.cancel')" class="p-button-text p-button-secondary p-button-rounded
      p-button-sm p-button-sm-icon tw-absolute tw-top-6 tw-right-0"></button>
    <h3 class="tw-text-white tw-text-2xl tw-font-bold tw-text-center tw-mb-4">{{ t('admin.createCollection.formHeader')
      }}</h3>
    <form id="create-collection-form" [formGroup]="createCollectionForm" formHandler
      (ngSubmit)="onCreateCollectionFormSubmit()">
      <label for="name" class="tw-inline-block tw-text-base tw-font-medium tw-mb-1.5">{{ t('admin.createCollection.name')
        }}</label>
      <input formControlName="name" class="tw-w-full" id="name" type="text" aria-describedby="name-error" pInputText
        autofocus>
      <small id="name-error" class="p-error tw-text-xs tw-block tw-my-2"
        [invalidControl]="createCollectionForm.controls.name">{{ createCollectionForm.controls.name.errors
        | firstErrorKey:'createCollection':'name' }}</small>
      <label for="overview" class="tw-inline-block tw-text-base tw-font-medium tw-mb-1.5">{{
        t('admin.createCollection.overview') }}</label>
      <textarea formControlName="overview" class="tw-w-full" id="overview" aria-describedby="overview-error"
        [placeholder]="t('admin.createCollection.overviewPlaceholder')" pTextarea [rows]="5"></textarea>
      <small id="overview-error" class="p-error tw-text-xs tw-block tw-my-2"
        [invalidControl]="createCollectionForm.controls.overview">{{ createCollectionForm.controls.overview.errors
        | firstErrorKey:'createCollection':'overview' }}</small>
    </form>
  </div>
  <div pDialogActions class="app-action-bar__actions">
    <button pButton type="button" [label]="t('admin.createCollection.cancel')"
      (click)="onCreateCollectionFormCancel()" class="p-button-text p-button-secondary p-button-sm">
    </button>
    <button pButton type="submit" form="create-collection-form" [label]="t('admin.createCollection.submit')"
      class="p-button p-button-sm" [disabled]="createCollectionForm.disabled">
    </button>
  </div>
</ng-container>
