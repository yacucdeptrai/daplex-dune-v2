<p-dialog-title></p-dialog-title>
<ng-container *transloco="let t">
  <div pDialogContent class="tw-relative" style="padding-top: 3rem">
    <button pButton type="button" icon="ms ms-close" (click)="onCreateGenreFormCancel()"
      [attr.aria-label]="t('admin.createGenre.cancel')" class="p-button-text p-button-secondary p-button-rounded
      p-button-sm p-button-sm-icon tw-absolute tw-top-6 tw-right-0"></button>
    <h3 class="tw-text-white tw-text-2xl tw-font-bold tw-text-center tw-mb-4">{{ t('admin.createGenre.formHeader') }}</h3>
    <form id="create-genre-form" [formGroup]="createGenreForm" formHandler (ngSubmit)="onCreateGenreFormSubmit()">
      <label for="name" class="tw-inline-block tw-text-base tw-font-medium tw-mb-1.5">{{ t('admin.createGenre.name')
        }}</label>
      <input formControlName="name" class="tw-w-full" id="name" type="text" aria-describedby="name-error" pInputText
        autofocus>
      <small id="name-error" class="p-error tw-text-xs tw-block tw-my-2"
        [invalidControl]="createGenreForm.controls.name">{{ createGenreForm.controls.name.errors
        | firstErrorKey:'createGenre':'name' }}</small>
    </form>
  </div>
  <div pDialogActions class="app-action-bar__actions">
    <button pButton type="button" [label]="t('admin.createGenre.cancel')" (click)="onCreateGenreFormCancel()"
      class="p-button-text p-button-secondary p-button-sm">
    </button>
    <button pButton type="submit" form="create-genre-form" [label]="t('admin.createGenre.submit')"
      class="p-button p-button-sm" [disabled]="createGenreForm.disabled">
    </button>
  </div>
</ng-container>
