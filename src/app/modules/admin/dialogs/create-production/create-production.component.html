<p-dialog-title></p-dialog-title>
<ng-container *transloco="let t">
  <div pDialogContent class="tw-relative" style="padding-top: 3rem">
    <button pButton type="button" icon="ms ms-close" (click)="onCreateProductionFormCancel()"
      [attr.aria-label]="t('admin.createProduction.cancel')" class="p-button-text p-button-secondary p-button-rounded
      p-button-sm p-button-sm-icon tw-absolute tw-top-6 tw-right-0"></button>
    <h3 class="tw-text-white tw-text-2xl tw-font-bold tw-text-center tw-mb-4">{{ t('admin.createProduction.formHeader')
      }}</h3>
    <form id="create-production-form" [formGroup]="createProductionForm" formHandler
      (ngSubmit)="onCreateProductionFormSubmit()">
      <label for="name" class="tw-inline-block tw-text-base tw-font-medium tw-mb-1.5">{{ t('admin.createProduction.name')
        }}</label>
      <input formControlName="name" class="tw-w-full" id="name" type="text" aria-describedby="name-error" pInputText
        autofocus>
      <small id="name-error" class="p-error tw-text-xs tw-block tw-my-2"
        [invalidControl]="createProductionForm.controls.name">{{ createProductionForm.controls.name.errors
        | firstErrorKey:'createProduction':'name' }}</small>
      <label for="country" class="tw-inline-block tw-text-base tw-font-medium tw-mb-1.5">{{
        t('admin.createProduction.country') }}</label>
      <p-select id="country" formControlName="country" [options]="countryOptions || []" scrollHeight="250px"
        [placeholder]="t('admin.createProduction.countryPlaceholder')" [showClear]="true" appendTo="body"
        panelStyleClass="p-select-sm" styleClass="tw-w-full tw-mb-4">
      </p-select>
    </form>
  </div>
  <div pDialogActions class="app-action-bar__actions">
    <button pButton type="button" [label]="t('admin.createProduction.cancel')"
      (click)="onCreateProductionFormCancel()" class="p-button-text p-button-secondary p-button-sm">
    </button>
    <button pButton type="submit" form="create-production-form" [label]="t('admin.createProduction.submit')"
      class="p-button p-button-sm" [disabled]="createProductionForm.disabled">
    </button>
  </div>
</ng-container>
