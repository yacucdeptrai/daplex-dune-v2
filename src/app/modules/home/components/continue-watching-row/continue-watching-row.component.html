<ng-container *transloco="let t">
  <!-- Reserve the rail's height while loading so cards swap in with zero CLS; collapse
    entirely only once resolved-empty (AC9 — a one-time settle for the empty case). -->
  @if (loading() || results().length) {
    <section aria-labelledby="continue-watching-heading">
      <div class="tw-mt-4">
        <h3 id="continue-watching-heading" class="tw-text-gray-200 tw-text-xl tw-font-bold tw-uppercase">
          {{ t('home.mediaList.continueWatching') }}
        </h3>
      </div>
      <!-- Single-row horizontal rail (not a wrapping grid). No flex `gap` (iOS-13 floor) —
        margin spacing via tw-space-x; landscape cards are wider than the poster rails below. -->
      <div class="tw-my-4 tw-flex tw-overflow-x-auto tw-space-x-3 tw-pb-2 tw--mx-1 tw-px-1">
        @if (loading()) {
          @for (cell of skeletonCells; track $index) {
            <!-- Static, motion-free placeholders matching one landscape card's height. -->
            <div class="tw-flex-shrink-0 tw-w-64 sm:tw-w-72 lg:tw-w-80" data-skeleton aria-hidden="true">
              <div class="tw-aspect-w-16 tw-aspect-h-9">
                <div class="tw-bg-neutral-725 tw-rounded-md"></div>
              </div>
              <div class="tw-bg-neutral-725 tw-rounded tw-h-4 tw-mt-2"></div>
              <div class="tw-bg-neutral-725 tw-rounded tw-h-3 tw-mt-1.5 tw-w-2/3"></div>
            </div>
          }
        } @else {
          @for (history of results(); track history._id) {
            <app-resume-card class="tw-flex-shrink-0 tw-w-64 sm:tw-w-72 lg:tw-w-80"
              [history]="history" [resumeMetaId]="'resume-meta-' + history._id"></app-resume-card>
          }
        }
      </div>
      <div class="tw-divider tw-my-5"></div>
    </section>
  }
</ng-container>
